<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoxCPM2 Voice Cloning Console</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">vLLM-Omni gateway</p>
          <h1>Voice cloning console</h1>
        </div>
        <div class="status-pill" id="serverStatus">Checking server</div>
      </section>

      <section class="workspace">
        <form id="speechForm" class="panel controls">
          <input type="hidden" name="mode" id="modeInput" value="controllable_cloning" />
          <input type="hidden" name="voice" id="voiceInput" />
          <input type="hidden" name="response_format" id="formatInput" value="wav" />

          <div class="mode-switch" aria-label="Use case">
            <button type="button" class="mode-tab active" data-mode="controllable_cloning" aria-pressed="true">Controllable cloning</button>
            <button type="button" class="mode-tab" data-mode="ultimate_cloning" aria-pressed="false">Ultimate cloning</button>
            <button type="button" class="mode-tab" data-mode="voice_design" aria-pressed="false">Voice design</button>
          </div>

          <div class="grid two">
            <label>
              Model
              <input name="model" id="modelInput" value="openbmb/VoxCPM2" />
            </label>
            <label>
              Output
              <select name="delivery" id="deliverySelect">
                <option value="stream">Streaming preview</option>
                <option value="file">WAV file</option>
              </select>
            </label>
          </div>

          <section class="mode-panel active" data-mode-panel="controllable_cloning">
            <h2>Controllable cloning</h2>
            <label>
              Target text
              <textarea name="input" rows="7" required>This is a cloned voice generated by VoxCPM2.</textarea>
            </label>
            <label>
              Style control
              <input name="control_instruction" placeholder="Cheerful, slightly faster, clear delivery" />
            </label>
            <fieldset>
              <legend>Reference audio</legend>
              <div class="preset-picker">
                <div class="grid two">
                  <label>
                    Preset language
                    <select data-preset-language>
                      <option value="">Upload or URL</option>
                    </select>
                  </label>
                  <label>
                    Preset voice
                    <select data-preset-voice disabled>
                      <option value="">Select voice</option>
                    </select>
                  </label>
                  <label>
                    Preset sample
                    <select data-preset-sample disabled>
                      <option value="">Select sample</option>
                    </select>
                  </label>
                  <label>
                    Preset format
                    <select name="preset_format" data-preset-format disabled>
                      <option value="wav">WAV reference</option>
                      <option value="mp3">MP3 reference</option>
                    </select>
                  </label>
                </div>
                <input type="hidden" name="preset_voice" data-preset-value />
                <audio data-preset-preview controls hidden></audio>
              </div>
              <label>
                Upload
                <input type="file" name="ref_audio" accept="audio/*" />
              </label>
              <label>
                URL or data URI
                <input name="ref_audio_url" placeholder="https://example.com/reference.wav" />
              </label>
            </fieldset>
          </section>

          <section class="mode-panel" data-mode-panel="ultimate_cloning" hidden>
            <h2>Ultimate cloning</h2>
            <label>
              Target text
              <textarea name="input" rows="7" required disabled>Continue speaking in the reference voice.</textarea>
            </label>
            <fieldset>
              <legend>Reference audio</legend>
              <div class="preset-picker">
                <div class="grid two">
                  <label>
                    Preset language
                    <select data-preset-language disabled>
                      <option value="">Upload or URL</option>
                    </select>
                  </label>
                  <label>
                    Preset voice
                    <select data-preset-voice disabled>
                      <option value="">Select voice</option>
                    </select>
                  </label>
                  <label>
                    Preset sample
                    <select data-preset-sample disabled>
                      <option value="">Select sample</option>
                    </select>
                  </label>
                  <label>
                    Preset format
                    <select name="preset_format" data-preset-format disabled>
                      <option value="wav">WAV reference</option>
                      <option value="mp3">MP3 reference</option>
                    </select>
                  </label>
                </div>
                <input type="hidden" name="preset_voice" data-preset-value disabled />
                <audio data-preset-preview controls hidden></audio>
              </div>
              <label>
                Upload
                <input type="file" name="ref_audio" accept="audio/*" disabled />
              </label>
              <label>
                URL or data URI
                <input name="ref_audio_url" placeholder="https://example.com/reference.wav" disabled />
              </label>
            </fieldset>
            <fieldset>
              <legend>Prompt audio and transcript</legend>
              <label>
                Prompt audio upload
                <input type="file" name="prompt_audio" accept="audio/*" disabled />
              </label>
              <label>
                Prompt audio URL or data URI
                <input name="prompt_audio_url" disabled />
              </label>
              <label>
                Reference transcript
                <textarea name="prompt_text" rows="3" disabled></textarea>
              </label>
            </fieldset>
          </section>

          <section class="mode-panel" data-mode-panel="voice_design" hidden>
            <h2>Voice design</h2>
            <label>
              Target text
              <textarea name="input" rows="7" required disabled>Hello from VoxCPM2 on vLLM-Omni.</textarea>
            </label>
            <label>
              Voice description
              <input name="control_instruction" placeholder="A warm young speaker, calm and expressive" disabled />
            </label>
          </section>

          <details class="advanced" open>
            <summary>Inference parameters</summary>
            <div class="grid two">
              <label>
                CFG value
                <input type="number" name="cfg_value" value="2.0" min="1" max="3" step="0.1" />
              </label>
              <label>
                Inference timesteps
                <input type="number" name="inference_timesteps" value="10" min="1" max="50" step="1" />
              </label>
              <label>
                Minimum length
                <input type="number" name="min_len" value="2" min="0" max="4096" step="1" />
              </label>
              <label>
                Maximum length
                <input type="number" name="max_len" value="4096" min="1" max="8192" step="1" />
              </label>
              <label>
                Retry max times
                <input type="number" name="retry_badcase_max_times" value="3" min="0" max="10" step="1" />
              </label>
              <label>
                Retry ratio threshold
                <input type="number" name="retry_badcase_ratio_threshold" value="6.0" min="1" max="20" step="0.1" />
              </label>
            </div>
            <div class="switch-grid">
              <label class="check-row">
                <input type="checkbox" name="normalize" value="true" />
                <span>Normalize text</span>
              </label>
              <label class="check-row">
                <input type="checkbox" name="denoise" value="true" />
                <span>Denoise reference audio</span>
              </label>
              <label class="check-row">
                <input type="checkbox" name="retry_badcase" value="true" checked />
                <span>Retry bad cases</span>
              </label>
            </div>
            <label>
              Extra payload JSON
              <textarea name="extra_json" rows="4" placeholder='{"temperature": 0.8}'></textarea>
            </label>
          </details>

          <div class="actions">
            <button type="submit" id="generateBtn">Generate</button>
            <button type="button" id="stopBtn" class="secondary">Stop</button>
          </div>
        </form>

        <section class="panel output">
          <div class="player-head">
            <div>
              <p class="eyebrow">Streaming output</p>
              <h2 id="playbackState">Ready</h2>
            </div>
            <div class="dot" id="playbackDot"></div>
          </div>

          <div class="meter">
            <span>TTFB</span>
            <strong id="ttfb">-</strong>
          </div>
          <div class="meter">
            <span>Total latency</span>
            <strong id="totalLatency">-</strong>
          </div>
          <div class="meter">
            <span>Chunks</span>
            <strong id="chunks">0</strong>
          </div>
          <div class="meter">
            <span>Audio</span>
            <strong id="duration">0.0s</strong>
          </div>
          <div class="meter">
            <span>RTF</span>
            <strong id="rtf">-</strong>
          </div>

          <div class="progress">
            <div id="progressBar"></div>
          </div>

          <audio id="fileAudio" controls hidden></audio>
          <a id="downloadLink" class="download" hidden download="voxcpm2-output.wav">Download audio</a>

          <pre id="log"></pre>
        </section>
      </section>
    </main>
    <script src="/static/player.js?v=20260512-voice-presets"></script>
  </body>
</html>
